name: makeupmatch_flutter
description: MakeupMatch - Rekomendasi Tipe Makeup
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  http: ^1.3.0
  dio: ^5.8.0
  
  # Auth & Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.0
  
  # Image picker
  image_picker: ^1.2.0
  
  google_mlkit_face_detection: ^0.14.0
  
  flutter_litert: ^0.2.2
  image: ^4.2.0

  # UI
  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/banner_scan.jpg
    - assets/images/banner_explore.JPG
    - assets/images/banner_history.jpg
    - assets/models/face_shape_model.tflite
    - assets/models/face_shape_labels.txt

dependency_overrides:
  objective_c: ^2.0.0